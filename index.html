<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Tracker - 持股分佈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=7">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="app-header glass-panel fade-in-up">
            <div class="logo">
                <i class="fa-solid fa-chart-pie"></i>
            </div>
            <div class="header-titles">
                <div class="etf-name-row">
                    <div class="etf-select-wrapper" id="etf-select-wrapper">
                        <i class="fa-solid fa-caret-down etf-select-arrow"></i>
                        <select id="etf-selector" class="etf-select">
                            <option value="00981A">00981A 主動統一台股增長</option>
                            <option value="00988A">00988A 主動統一全球創新</option>
                            <option value="00980A">00980A 野村臺灣智慧優選</option>
                            <option value="00985A">00985A 主動野村台灣50</option>
                            <option value="00991A">00991A 主動復華未來50</option>
                            <option value="00992A">00992A 主動群益科技創新ETF</option>
                            <option value="00982A">00982A 主動群益台灣強棒</option>
                            <option value="00987A">00987A 台新台灣優勢成長</option>
                            <option value="00993A">00993A 主動安聯台灣</option>
                            <option value="00995A">00995A 主動中信台灣卓越</option>
                        </select>
                    </div>
                    <img id="manager-card-img" src="manager_00981A.jpg" alt="00981A 經理人卡" style="display:none;">
                </div>
                <p class="etf-switch-hint" id="etf-switch-hint"><i class="fa-solid fa-repeat"></i> 點擊上方名稱可切換 ETF 標的</p>
                <p id="header-subtitle"><i class="fa-solid fa-spinner fa-spin"></i> 載入經理人與績效資訊中...</p>
                <p id="etf-scale-info" style="display:none;"></p>
            </div>
        </header>

        <!-- YTD Ranking -->
        <div class="ytd-ranking-bar glass-panel fade-in-up" id="ytd-ranking-bar">
            <div class="ytd-ranking-title-block">
                <div class="ytd-ranking-title"><i class="fa-solid fa-trophy"></i> 今年以來績效排名 (YTD)</div>
                <div class="twii-ytd-text" id="twii-ytd-display"></div>
            </div>
            <div class="ytd-ranking-list" id="ytd-ranking-list">
                <span style="color:var(--text-secondary);font-size:0.85rem;">載入中...</span>
            </div>
        </div>

        <!-- Page Tabs -->
        <nav class="page-tabs fade-in-up">
            <button class="tab-btn active" data-tab="holdings">
                <i class="fa-solid fa-layer-group"></i> 持股清單
            </button>
            <button class="tab-btn" data-tab="cross">
                <i class="fa-solid fa-code-compare"></i> ETF持股交叉比對
            </button>
            <button class="tab-btn" data-tab="search">
                <i class="fa-solid fa-magnifying-glass"></i> 股票搜尋
            </button>
        </nav>

        <!-- Tab: Holdings -->
        <section class="dashboard-content fade-in-up delay-1" id="tab-holdings">
            <div class="card glass-panel">
                <div class="card-header">
                    <h2><i class="fa-solid fa-layer-group"></i> ETF持股明細</h2>
                    <span class="badge" id="update-date" style="display:none;"></span>
                </div>
                <div class="last-update-bar">
                    <i class="fa-regular fa-clock"></i>
                    <span id="last-update-time">資料載入中...</span>
                </div>
                <div class="table-container">
                    <table id="holdings-table">
                        <thead>
                            <tr>
                                <th>序號</th>
                                <th>股票</th>
                                <th class="align-right"><i class="fa-solid fa-money-bill"></i> 股價</th>
                                <th><i class="fa-solid fa-coins"></i> 股數</th>
                                <th class="align-right"><i class="fa-solid fa-scale-balanced"></i> 比例</th>
                                <th class="align-right" id="th-status" style="cursor:pointer;" title="點擊切換排序"><i class="fa-solid fa-tag"></i> 狀態 <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
                                <th class="align-right" id="th-diff-shares" style="cursor:pointer;" title="點擊切換排序"><i class="fa-solid fa-arrow-trend-up"></i> 加/減碼股數 <i class="fa-solid fa-sort" style="opacity:0.3"></i></th>
                                <th class="align-right" id="th-diff-amount" style="cursor: pointer;" title="點擊切換排序"><i class="fa-solid fa-sack-dollar"></i> 加/減碼金額 <i class="fa-solid fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="holdings-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="card glass-panel stats-card">
                <div class="stat-item">
                    <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
                    <div class="stat-value">RR4</div>
                    <div class="stat-label">風險等級</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon"><i class="fa-solid fa-money-bill-trend-up"></i></div>
                    <div class="stat-value" id="stat-dist-freq">季配息</div>
                    <div class="stat-label">配息頻率<br><span id="stat-dist-next" style="font-size:0.82em;color:#60a5fa;font-weight:400;"></span></div>
                </div>
            </div>
        </section>

        <!-- Tab: Cross Compare -->
        <section class="dashboard-content fade-in-up delay-1" id="tab-cross" style="display:none;">
            <div class="card glass-panel">
                <div class="card-header">
                    <h2><i class="fa-solid fa-code-compare"></i> ETF持股交叉比對</h2>
                    <span class="badge" id="cross-badge">載入中...</span>
                </div>
                <div class="last-update-bar">
                    <i class="fa-regular fa-clock"></i>
                    <span id="cross-update-time">資料載入中...</span>
                </div>
                <div class="table-container">
                    <table id="cross-table">
                        <thead>
                            <tr>
                                <th>序號</th>
                                <th>股票</th>
                                <th><i class="fa-solid fa-layer-group"></i> 持有 ETF 與比例</th>
                                <th class="align-right" id="th-cross-etf-count" style="cursor:pointer;" title="點擊切換排序">
                                    <i class="fa-solid fa-hashtag"></i> 持有 ETF 數 <i class="fa-solid fa-sort-down"></i>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="cross-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

        <!-- Tab: Stock Search -->
        <section class="dashboard-content fade-in-up delay-1" id="tab-search" style="display:none;">
            <div class="search-layout">
                <!-- Left Column -->
                <div class="search-left-panel glass-panel card">
                    <div class="card-header" style="margin-bottom:1rem;">
                        <h2><i class="fa-solid fa-magnifying-glass"></i> 搜尋股票</h2>
                    </div>
                    <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:1.5rem;">
                        請輸入股票代號 (如: 2330) 或名稱 (如: 台積電)
                    </p>
                    <div class="search-input-wrapper">
                        <i class="fa-solid fa-search search-icon"></i>
                        <input type="text" id="stock-search-input" class="search-input" placeholder="輸入代號或名稱...">
                        <button id="clear-search-btn" class="clear-btn" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div id="search-status" class="search-status">
                        準備就緒，輸入關鍵字開始搜尋。
                    </div>
                </div>

                <!-- Right Column -->
                <div class="search-right-panel glass-panel card">
                    <div class="card-header">
                        <h2><i class="fa-solid fa-list-check"></i> 搜尋結果 <span id="search-result-title" style="color:var(--accent-color);margin-left:0.5rem;font-size:1.1rem;"></span></h2>
                    </div>
                    <div class="table-container" id="search-results-container">
                        <!-- Default empty state -->
                        <div class="empty-state" id="search-empty-state">
                            <i class="fa-solid fa-magnifying-glass-chart" style="font-size:3rem;color:rgba(255,255,255,0.1);margin-bottom:1rem;display:block;"></i>
                            左側輸入股票資訊，在此查看持有該股的 ETF 列表。
                        </div>
                        <table id="search-table" style="display:none;">
                            <thead>
                                <tr>
                                    <th>序號</th>
                                    <th>持有 ETF</th>
                                    <th class="align-right">權重佔比</th>
                                </tr>
                            </thead>
                            <tbody id="search-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

    <!-- Lightbox for manager card -->
    <div id="lightbox-overlay" style="display:none;" onclick="this.style.display='none'">
        <img id="lightbox-img" src="manager_00981A.jpg" alt="00981A 經理人卡">
        <div id="lightbox-close">✕</div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
