name: Daily ETF Holdings Update - 00988A (全球，含美股)

on:
  schedule:
    # 台灣時間 08:00–12:30（週一至週五），對應 UTC 00:00–04:30（Mon–Fri）
    # 每 30 分鐘一次，共 10 次，直到持股更新完成為止
    - cron: '0,30 0-4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-00988A:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run 00988A update script (台灣時間中午12點起，每30分鐘檢查)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python check_and_update_00988A.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_00988A.json holdings/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update 00988A holdings $(date +'%Y-%m-%d')" && git push
