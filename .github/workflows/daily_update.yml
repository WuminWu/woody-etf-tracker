name: Daily ETF Holdings Update

on:
  schedule:
    # 08:00 UTC = 16:00 Taiwan (UTC+8) — first attempt
    - cron: '0 8 * * 1-5'
    # 09:00 UTC = 17:00 Taiwan — retry if not yet updated
    - cron: '0 9 * * 1-5'
    # 10:00 UTC = 18:00 Taiwan — final retry
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run all ETF update scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python check_and_update_00981A.py
          python check_and_update_00980A.py
          python check_and_update_00985A.py
          python check_and_update_00991A.py
          python check_and_update_00992A.py
          python check_and_update_00982A.py
          python check_and_update_00987A.py
          python check_and_update_00993A.py
          python check_and_update_00995A.py
          python check_and_update_index.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_*.json holdings/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update ETF holdings $(date +'%Y-%m-%d')" && git push
