name: Daily ETF Holdings Update

on:
  schedule:
    # 台灣時間 15:00–19:30（UTC+8），週一至週五，每 30 分鐘，共 10 次
    # UTC 07:00–11:30，Mon–Fri
    - cron: '0,30 7-11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-holdings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run ETF update scripts (台股，不含 00988A)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python check_and_update_00981A.py || true
          python check_and_update_00980A.py || true
          python check_and_update_00985A.py || true
          python check_and_update_00991A.py || true
          python check_and_update_00992A.py || true
          python check_and_update_00982A.py || true
          python check_and_update_00987A.py || true
          python check_and_update_00993A.py || true
          python check_and_update_00995A.py || true
          python check_and_update_index.py || true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_*.json holdings/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Auto-update ETF holdings $(date +'%Y-%m-%d')" && git push
